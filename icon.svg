<svg viewBox="0 0 400 410" xmlns="http://www.w3.org/2000/svg" width="100%" style="max-width:320px;display:block;margin:0 auto">
  <defs>
    <!-- Fondo: gradiente radial oscuro con profundidad -->
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a2640"/>
      <stop offset="100%" stop-color="#060a12"/>
    </radialGradient>

    <!-- Círculo: gradiente angular que simula luz metálica -->
    <linearGradient id="ring" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#7ee8ff"/>
      <stop offset="30%" stop-color="#38bdf8"/>
      <stop offset="65%" stop-color="#0e7aab"/>
      <stop offset="100%" stop-color="#1de9b6"/>
    </linearGradient>

    <!-- $ símbolo: gradiente vertical plateado -->
    <linearGradient id="dollar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="28%" stop-color="#e8f4ff"/>
      <stop offset="55%" stop-color="#c2d8f0"/>
      <stop offset="80%" stop-color="#dbeeff"/>
      <stop offset="100%" stop-color="#a8c8e8"/>
    </linearGradient>

    <!-- Resplandor interior del círculo -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <!-- Reflejo superior del ícono (luz especular) -->
    <linearGradient id="shine" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="rounded">
      <rect width="400" height="400" rx="80"/>
    </clipPath>
  <mask id="imagine-text-gaps-5mysuc" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="400" height="410" fill="white"/><rect x="138.34375" y="81.00001525878906" width="123.3125" height="209" fill="black" rx="2"/><rect x="138.34375" y="81.00001525878906" width="123.3125" height="209" fill="black" rx="2"/></mask></defs>

  <!-- Fondo con gradiente radial -->
  <rect width="400" height="400" rx="80" fill="url(#bg)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Textura sutil: puntos finos en cuadrícula -->
  <rect width="400" height="400" rx="80" fill="url(#shine)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Resplandor central difuso -->
  <circle cx="200" cy="200" r="160" fill="url(#glow)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Sombra del círculo (halo exterior) -->
  <circle cx="200" cy="202" r="132" fill="none" stroke="#000d1a" stroke-width="14" opacity="0.5" style="fill:none;stroke:rgb(0, 13, 26);color:rgb(255, 255, 255);stroke-width:14px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Círculo principal con gradiente metálico -->
  <circle cx="200" cy="200" r="130" fill="none" stroke="url(#ring)" stroke-width="7" style="fill:none;color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Reflejo superior del círculo (arco de luz) -->
  <path d="M 102 158 A 130 130 0 0 1 298 158" fill="none" stroke="#a8eeff" stroke-width="2.5" stroke-linecap="round" opacity="0.35" mask="url(#imagine-text-gaps-5mysuc)" style="fill:none;stroke:rgb(168, 238, 255);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Símbolo $ con gradiente plateado -->
  <text x="200" y="248" font-family="Georgia,serif" font-size="180" font-weight="700" fill="url(#dollar)" text-anchor="middle" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:180px;font-weight:700;text-anchor:middle;dominant-baseline:auto">$</text>

  <!-- Reflejo especular sobre el $ (brillo superior izquierdo) -->
  <text x="200" y="248" font-family="Georgia,serif" font-size="180" font-weight="700" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08" text-anchor="middle" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.08;font-family:Georgia, serif;font-size:180px;font-weight:700;text-anchor:middle;dominant-baseline:auto">$</text>

  <!-- Shine overlay esquina superior izquierda -->
  <ellipse cx="145" cy="130" rx="70" ry="45" fill="#ffffff" opacity="0.03" transform="rotate(-20 145 130)" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.03;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>